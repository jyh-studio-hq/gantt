<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3;url=https://hq-engine.vercel.app/">
<title>薛仁淵建築師事務所 - 系統導向</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   延續事務所標準配色與風格
   ══════════════════════════════════════ */
:root {
  --bg: #FFFFFF;
  --text: #111111;
  --text2: #4B5563;
  --active-bg: #2C5282;
  --border-dark: #111111;
  --font: 'Noto Sans TC', '微軟正黑體', sans-serif;
  --font-mono: 'Roboto Mono', Consolas, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.redirect-container {
  max-width: 600px;
  padding: 2rem;
  border: 1px solid #E5E7EB;
  position: relative;
}

.redirect-container::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 5px; height: 100%;
  background: var(--active-bg);
}

.firm-name h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
}

.en-name {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text2);
  display: block;
  margin-bottom: 2rem;
}

.status-msg {
  font-size: 15px;
  letter-spacing: 0.05em;
  color: var(--text);
  margin-bottom: 1rem;
}

.loader-bar {
  width: 100px;
  height: 2px;
  background: #EEE;
  margin: 20px auto;
  position: relative;
  overflow: hidden;
}

.loader-bar::after {
  content: "";
  position: absolute;
  left: -50%;
  width: 50%;
  height: 100%;
  background: var(--active-bg);
  animation: loading 1.5s infinite linear;
}

@keyframes loading {
  from { left: -50%; }
  to { left: 100%; }
}

.manual-link {
  font-size: 12px;
  color: var(--text2);
  text-decoration: none;
  border-bottom: 1px solid var(--text2);
  font-family: var(--font-mono);
}

.manual-link:hover {
  color: var(--active-bg);
  border-color: var(--active-bg);
}
</style>
</head>
<body>

<div class="redirect-container">
  <div class="firm-name">
    <h1>薛仁淵建築師事務所</h1>
    <span class="en-name">JEN-YUAN HSUEH ARCHITECTS</span>
  </div>
  
  <div class="status-msg">系統正在轉向總部平台服務...</div>
  
  <div class="loader-bar"></div>
  
  <p style="font-size: 12px; color: #999; margin-top: 20px;">
    若瀏覽器沒有自動跳轉，請點擊下方連結：<br><br>
    <a href="https://hq-engine.vercel.app/" class="manual-link">GO TO HQ PLATFORM →</a>
  </p>
</div>

<script>
// 保護機制：鎖定右鍵
document.addEventListener('contextmenu', e => e.preventDefault());

// 第二道保險：使用 JS 確保 3 秒後強制跳轉
setTimeout(function() {
  window.location.href = "https://hq-engine.vercel.app/";
}, 3000);
</script>

</body>
</html>
